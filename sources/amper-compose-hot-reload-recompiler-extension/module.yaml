product: jvm/lib

description: Compose Hot Reload recompiler integration used by the Amper CLI.

apply:
  - ../common.module-template.yaml

settings:
  kotlin:
    serialization: json
  publishing:
    enabled: true

dependencies:
  - ../libraries/async-processes
  - ../libraries/system-info
  - $libs.compose.hot.reload.devtools.api
  - $libs.kotlinx.coroutines.core
  - $libs.ktor.client
  - $libs.ktor.client.cio
  - $libs.ktor.client.contentNegotiation
  - $libs.ktor.serialization.kotlinx.json
