product: jvm/lib

description: |
  A single place to call IntelliJ Platform APIs. 
  Other modules should avoid calling IJ APIs directly, and avoid dependencies on IJ platform artifacts.

apply:
  - ../common.module-template.yaml
  - ../used-in-gradle.module-template.yaml
  - ../used-in-idea.module-template.yaml

dependencies:
  - ../amper-telemetry
  - ../core
  - ../frontend/plain/toml-psi
  - ../frontend/plain/yaml-psi
  - ../frontend/plain/amper-psi
  - ../libraries/telemetry
  - $libs.intellij.platform.util
  - $libs.intellij.platform.core
  - $libs.intellij.platform.coreImpl

settings:
  jvm:
    jdk:
      # We cannot just use settings.jvm.release without settings.jvm.jdk.version because of KT-72880
      version: 17
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17
