product: jvm/lib

description: |
  Compose Resources code generation library.
  
  The logic is copied mostly "as is" from compose-multiplatform Gradle Plugin's 
  [resources handling code](https://github.com/JetBrains/compose-multiplatform/tree/e3a78f3f90b4cb9293dfe3bc1d2e7b94ce317fdf/gradle-plugins/compose/src/main/kotlin/org/jetbrains/compose/resources)
  and should be kept in sync until this library is published and shared.
  
  This is a library that is _temporarily_ a part of the Amper project,
  but itself is fully independent of it.
  
  No dependencies on any amper modules should be here.

apply:
  - ../../common.module-template.yaml

dependencies:
  # WARNING: No dependencies on amper-specific modules are permitted here!
  - $libs.kotlinx.coroutines.core
  - $libs.kotlin.poet
  - $libs.slf4j.api
