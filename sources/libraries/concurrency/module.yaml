product: jvm/lib

description: Coroutines-friendly concurrency and locking utilities.

apply:
  - ../../common.module-template.yaml
  - ../../used-in-gradle.module-template.yaml
  - ../../used-in-idea.module-template.yaml
  - ../../used-in-kotlin-notebook.module-template.yaml

dependencies:
  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api

settings:
  jvm:
    # Used in Android Gradle builds (max 17), IDEA (max 21), and Notebooks (max 11), so we pick 11
    release: 11
