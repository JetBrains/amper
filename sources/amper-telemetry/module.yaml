product: jvm/lib

description: Telemetry utilities for Amper modules and processes.

apply:
  - ../common.module-template.yaml
  - ../used-in-gradle.module-template.yaml
  - ../used-in-idea.module-template.yaml
  - ../used-in-jic.module-template.yaml

dependencies:
  - ../amper-build-info
  - ../libraries/telemetry
  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api
  - $libs.opentelemetry.sdk.common
  - $libs.opentelemetry.exporterLoggingOtlp
  - $libs.opentelemetry.sdkTrace
  - $libs.opentelemetry.sdk

settings:
  kotlin:
    serialization: json
  jvm:
    # Used in IDEA (max 21), JIC (max 16), and Android Gradle builds (max 17), so we take the lowest version 16
    release: 16
