product: jvm/lib

description: |
  An executable that runs Java incremental compilation.
  
  It runs the compilation in-process, so it's expected to be run as a separate process itself (using a JDK as runtime).

apply:
  - ../../common.module-template.yaml
  - ../../used-in-jic.module-template.yaml

repositories:
  - id: ijSnapshots
    url: https://www.jetbrains.com/intellij-repository/snapshots

dependencies:
  - ../../amper-build-info
  - ../../amper-telemetry
  - ../amper-jic-api
  - ../jvm-inc-builder

  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api
  - $libs.slf4j.simple
  - $libs.intellij.jps.build.dependency.graph
  - org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0
  - $libs.opentelemetry.sdk.common
