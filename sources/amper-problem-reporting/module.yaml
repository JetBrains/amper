product: jvm/lib

description: Problem reporting abstractions and utilities.

apply:
  - ../common.module-template.yaml
  - ../used-in-gradle.module-template.yaml
  - ../used-in-idea.module-template.yaml

dependencies:
  - $libs.jetbrains.annotations # Needed to have @Nls applicable to type

settings:
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17
