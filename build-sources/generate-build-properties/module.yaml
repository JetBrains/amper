product: jvm/amper-plugin

description: A plugin to generate an `AmperBuild` class with build information such as version, date, git commit, etc.

apply:
  - ../../sources/common.module-template.yaml

dependencies:
  - $libs.charleskorn.kaml
  - $libs.kotlin.poet
  - $libs.org.eclipse.jgit
  - $libs.slf4j.simple

settings:
  kotlin:
    serialization: enabled
