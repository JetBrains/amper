product: jvm/amper-plugin

description: |
  A plugin to create and upload the Amper distribution. It creates an archive with all jars from the runtime classpath
  of the Amper CLI, as well as some directories containing other independent classpaths (JUnit listeners, plugin 
  processing, etc.). It then uploads the archive to our Maven repository.

apply:
  - ../../sources/common.module-template.yaml

pluginInfo:
  settingsClass: DistributionSettings

dependencies:
  - ../../sources/amper-build-info
  - ../../sources/amper-maven-publish
  - ../../sources/amper-wrapper
  - ../../sources/libraries/stdlib-extended
  - $libs.apacheCommons.compress
  - $libs.slf4j.simple
