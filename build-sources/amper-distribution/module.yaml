product: jvm/amper-plugin

description: |
  A plugin to create and upload the Amper distribution.
  
  It creates an archive with:
   - the runtime classpath of the Amper CLI
   - other independent classpaths (JUnit listeners, plugin processing, etc.)
   - shared Java arguments to run Amper
  
  It uploads the archive to our Maven repository or to the local repository (depending on the task that we call).

apply:
  - ../../sources/common.module-template.yaml

pluginInfo:
  settingsClass: DistributionSettings

dependencies:
  - ../../sources/amper-build-info
  - ../../sources/amper-maven-publish
  - ../../sources/amper-wrapper
  - ../../sources/libraries/stdlib-extended
  - $libs.apacheCommons.compress
  - $libs.slf4j.simple
