product: jvm/amper-plugin

description: |
  A plugin to run Dokka, similar to the Dokka Gradle plugin.
  
  Doesn't support KMP.
  
  Not all Dokka settings are exposed through the plugin settings; if you need to add other supported settings, refer to
  the [official docs](https://kotlinlang.org/docs/dokka-cli.html#json-configuration).

apply:
  - ../../sources/common.module-template.yaml

pluginInfo:
  settingsClass: org.jetbrains.amper.plugins.dokka.DokkaSettings

settings:
  kotlin:
    serialization:
      format: json
