product: jvm/amper-plugin

description: |
  Provides commands to handle common maintenance and dev tasks.
  
  This is both a plugin module that defines the custom commands and a project module where the plugin is enabled to 
  register those commands. It's a bit strange, but we don't have real project-level plugins or commands support yet.

apply:
  - ../../sources/common.module-template.yaml

pluginInfo:
  settingsClass: ProjectCommandsSettings

dependencies:
  - ../../sources/libraries/async-processes
  - $libs.kotlinx.coroutines.core

plugins:
  project-commands:
    enabled: true
    versions:
      bootstrapAmperVersion: 0.11.0-dev-3916 # AUTO-UPDATED BY THE CI
      # To find the latest version, check:
      # https://api.azul.com/metadata/v1/zulu/packages/?java_version=25&java_package_type=jre&latest=true&release_status=ga&page=1&page_size=1
      amperJre:
        zuluDistro: 25.32.21
        java: 25.0.2
      # We keep JUnit 5 here for now (so platform 1.14), because JUnit platform 6 requires Java 17, and we're not ready
      # to lower our minimum supported JDK to 17 right now.
      minSupportedJUnitPlatform: 1.14.3
      defaultsForUsers:
        compose: 1.10.3
        composeHotReload: 1.0.0
        jdk: 21
        junitPlatform: 6.0.1
        kotlin: 2.3.20
        kotlinxRpc: 0.10.2
        kotlinxSerialization: 1.10.0
        ksp: 2.3.7
        ktor: 3.4.1
        lombok: 1.18.38
        springBoot: 4.0.5